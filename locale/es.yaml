    _name: Factores primos
    gcd_formula_eq: ' = '
    gcd_none: (ninguno — coprimos)
    gcd_title: MCD — conservar solo los factores compartidos
    insight_coprime: '<strong>{A}</strong> y <strong>{B}</strong> son coprimos — no
      comparten factores primos, por lo que el MCD = 1. El MCM es simplemente su producto.
      Siempre es cierto: <strong>{A} × {B} = {AB}</strong> = MCD × MCM = <strong>1
      × {L} = {L}</strong>.'
    insight_shared_many: '<strong>{A}</strong> y <strong>{B}</strong> comparten los
      primos <strong>{primes}</strong>. El MCD toma solo los bloques verdes compartidos.
      El MCM toma todos los bloques — verdes compartidos, azules adicionales de A,
      rojos adicionales de B — sin contar ningún primo dos veces. Siempre es cierto:
      <strong>{A} × {B} = {AB}</strong> = MCD × MCM = <strong>{G} × {L} = {GL}</strong>.'
    insight_shared_one: '<strong>{A}</strong> y <strong>{B}</strong> comparten el
      primo <strong>{primes}</strong>. El MCD toma solo los bloques verdes compartidos.
      El MCM toma todos los bloques — verdes compartidos, azules adicionales de A,
      rojos adicionales de B — sin contar ningún primo dos veces. Siempre es cierto:
      <strong>{A} × {B} = {AB}</strong> = MCD × MCM = <strong>{G} × {L} = {GL}</strong>.'
