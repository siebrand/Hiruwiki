---
qqq:
  angle-guess:
    _name: Name of the Angle Guess module
    difference: Label for the difference between the target angle and the player's
      guess. Followed by a value in degrees.
    finalScore: Heading shown when all rounds are complete, above the total score
    hint: Instruction telling the user how to set their angle guess
    nextAngle: Button label to proceed to the next angle. Uses &rsaquo; as a right-pointing
      arrow.
    points: Label for the points earned. Followed by a numeric value.
    pts: Abbreviation for "points", displayed after a numeric score
    round: Label for the current round number. Followed by "X / Y".
    roundOver: Heading shown in the overlay when all rounds are finished
    target: Label for the target angle the player must guess. Followed by a value
      in degrees.
    tryAgain: Button label to start a new game after all rounds are complete
    yourGuess: Label for the angle the player guessed. Followed by a value in degrees.
  angles:
    _name: Name of the Angles module
    bisector: Button label for the bisector mode
    bisectorResult: 'Result text showing the bisector angle. Parameters: {0} = bisector
      angle in degrees.'
    complement: Button label for the complementary angle mode
    explement: Button label for the explementary angle mode
    notDefined: Message shown when the selected angle operation is not defined for
      the current angle (e.g. complement of an angle ≥ 90°)
    resultAngle: 'Result text showing a computed angle. Parameters: {0} = angle type
      name (e.g. "Complementary"), {1} = angle in degrees.'
    supplement: Button label for the supplementary angle mode
  circle-proof:
    _name: Name of the Circle Proof module
    animStopped: Status message shown when the user stops the animation
    area: Label for the area metric
    areaAnimStatus: Status message shown during the area proof animation, explaining
      that sectors reassemble into a rectangle
    areaReviewStatus: Status message shown after the area proof animation completes
    circAnimStatus: Status message shown during the circumference proof animation,
      explaining that semi-circles unroll into lines
    circReviewStatus: Status message shown after the circumference proof animation
      completes
    circumference: Label for the circumference metric
    initStatus: Initial status message prompting the user to choose a proof
    proveIt: Button label to start the proof animation. Includes ▶ play symbol.
    radius: Label for the radius slider
    readyStatus: Status message shown after selecting a proof tab, before starting
      the animation
    review: Button label shown after animation completes, to replay. Includes ▶ play
      symbol.
    stop: Button label to stop a running animation. Includes ■ stop symbol.
    tabArea: Tab label for the area proof
    tabCirc: Tab label for the circumference proof
    title: Title of the circle calculator sidebar
    visualProof: Section heading for the visual proof controls
  dividend:
    _name: Name of the Dividend and Divisor module
    eq_lbl_dividend: Label for the dividend in the division equation display
    eq_lbl_divisor: Label for the divisor in the division equation display
    eq_lbl_quotient: Label for the quotient in the division equation display
    eq_lbl_remainder: Label for the remainder in the division equation display
    insight_exact: 'Insight text shown when division is exact (no remainder). Uses
      HTML. Parameters: {N} = dividend, {D} = divisor, {Q} = quotient, {s} = plural
      suffix for "chunk" (empty when Q=1, "s" otherwise).'
    insight_less: 'Insight text shown when the dividend is smaller than the divisor.
      Uses HTML. Parameters: {N} = dividend, {D} = divisor.'
    insight_normal: 'Insight text shown for normal division with a remainder. Uses
      HTML. Parameters: {N} = dividend, {D} = divisor, {Q} = quotient, {R} = remainder,
      {QD} = quotient × divisor.'
    label_bar_description: 'Label for the bar visualisation section showing the chunk
      size. Uses PLURAL. Parameters: $1 = the divisor (chunk size).'
    label_choose: Heading for the input section where the user selects dividend and
      divisor
    label_dividend: Label for the dividend input slider, with a parenthetical explanation
    label_divisor: Label for the divisor input slider, with a parenthetical explanation
    label_equation: Heading for the division equation section
    label_repadd: Heading for the repeated addition section
    repadd_exact: Text appended to the repeated addition when division is exact
    repadd_leftover: Text shown after the leftover value in the repeated addition
    repadd_less: 'Text shown in the repeated addition section when the dividend is
      less than the divisor. Parameters: {N} = dividend, {D} = divisor.'
  factors:
    _name: Name of the Prime Factors module
    gcd_formula_eq: Equals sign used in the GCD formula display
    gcd_none: Text shown when two numbers share no prime factors (are coprime)
    gcd_title: Heading for the GCD (Greatest Common Divisor) section
    insight_coprime: 'Insight text shown when the two numbers are coprime. Uses HTML.
      Parameters: {A} = first number, {B} = second number, {AB} = their product, {L}
      = LCM.'
    insight_shared_many: 'Insight text shown when the two numbers share multiple prime
      factors. Uses HTML. Parameters: {A} = first number, {B} = second number, {primes}
      = shared primes, {AB} = product, {G} = GCD, {L} = LCM, {GL} = GCD × LCM.'
    insight_shared_one: 'Insight text shown when the two numbers share exactly one
      prime factor. Uses HTML. Parameters: {A} = first number, {B} = second number,
      {primes} = shared prime, {AB} = product, {G} = GCD, {L} = LCM, {GL} = GCD ×
      LCM.'
    label_choose: Heading for the input section where the user selects two numbers
    label_factors: Heading for the prime factors display section
    label_how: Heading for the section explaining how GCD and LCM are built
    lcm_formula_eq: Equals sign used in the LCM formula display
    lcm_title: Heading for the LCM (Least Common Multiple) section
    legend_onlyA: Legend label for factor blocks unique to number A
    legend_onlyB: Legend label for factor blocks unique to number B
    legend_shared: Legend label for factor blocks shared between A and B (used for
      GCD)
