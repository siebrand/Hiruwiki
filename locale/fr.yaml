      Le reste est toujours inférieur au diviseur.
    insight_normal: '<strong>{N} ÷ {D} = {Q}</strong> reste <strong>{R}</strong>.
      Notez que la pièce rouge (<strong>{R}</strong>) est toujours plus courte qu''un
      morceau bleu (<strong>{D}</strong>). Le reste est toujours strictement inférieur
      au diviseur. Vérification : <strong>{Q} × {D} + {R} = {QD} + {R} = {N}</strong>
      ✓'
