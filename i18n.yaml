      La récupération à partir de zéro est <strong>impossible</strong> — n'importe
      quel pourcentage de 0 est toujours 0.
    insight_gain: Un gain de <strong>+{pct}%</strong> porte 100 à <strong>{result}</strong>.
      La barre verte en haut et la barre rouge en bas ont la même largeur — mais les
      pourcentages diffèrent. Revenir à 100 ne prend que <strong>{recovery}%</strong>,
      pas −{pct}%.
    insight_loss: Une perte de <strong>{pct}%</strong> ramène 100 à <strong>{result}</strong>.
      La barre rouge en haut et la barre verte en bas couvrent la même distance physique
      — mais les pourcentages diffèrent car ils s'appliquent à des bases différentes.
      La récupération nécessite <strong>+{recovery}%</strong>, pas +{pct}%.
    insight_zero: Aucun changement appliqué. Faites glisser le curseur pour explorer.
    label_after: après changement
