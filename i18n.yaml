dividend:
  en:
    _name: Dividend and Divisor
    eq_lbl_dividend: dividend
    eq_lbl_divisor: divisor
    eq_lbl_quotient: quotient
    eq_lbl_remainder: remainder
    insight_exact: <strong>{N} ÷ {D} = {Q}</strong> exactly — no remainder. The bar
      fills perfectly into <strong>{Q}</strong> equal chunk{s}. This means <strong>{D}</strong>
      is a divisor of <strong>{N}</strong>.
    insight_less: <strong>{N}</strong> is smaller than the divisor <strong>{D}</strong>,
      so it fits <strong>0</strong> whole chunks. The entire value is the remainder.
      The remainder is always less than the divisor.
    insight_normal: '<strong>{N} ÷ {D} = {Q}</strong> remainder <strong>{R}</strong>.
      Notice the red piece (<strong>{R}</strong>) is always shorter than one blue
      chunk (<strong>{D}</strong>). The remainder is always strictly less than the
      divisor. Check: <strong>{Q} × {D} + {R} = {QD} + {R} = {N}</strong> ✓'
    label_bar: Bar view — each blue chunk =
    label_bar_units: units
    label_choose: Choose dividend and divisor
    label_dividend: Dividend (the number being divided)
    label_divisor: Divisor (the chunk size)
    label_equation: Division equation
    label_repadd: Repeated addition
    repadd_exact: — divides exactly!
    repadd_leftover: left over
    repadd_less: '{N} is less than {D}, so the quotient is 0 and the whole value is
      the remainder.'
  es:
    _name: Dividendo y divisor
    eq_lbl_dividend: dividendo
    eq_lbl_divisor: divisor
    eq_lbl_quotient: cociente
    eq_lbl_remainder: resto
    insight_exact: <strong>{N} ÷ {D} = {Q}</strong> exacto — sin resto. La barra se
      llena perfectamente en <strong>{Q}</strong> fragmentos iguales. Esto significa
      que <strong>{D}</strong> es un divisor de <strong>{N}</strong>.
    insight_less: <strong>{N}</strong> es menor que el divisor <strong>{D}</strong>,
      por lo que cabe en <strong>0</strong> fragmentos enteros. Todo el valor es el
      resto. El resto es siempre menor que el divisor.
    insight_normal: '<strong>{N} ÷ {D} = {Q}</strong> resto <strong>{R}</strong>.
      Nota que la pieza roja (<strong>{R}</strong>) siempre es más corta que un fragmento
      azul (<strong>{D}</strong>). El resto siempre es estrictamente menor que el
      divisor. Comprobación: <strong>{Q} × {D} + {R} = {QD} + {R} = {N}</strong> ✓'
    label_bar: Vista de barra — cada fragmento azul =
    label_bar_units: unidades
    label_choose: Elige el dividendo y el divisor
    label_dividend: Dividendo (el número a dividir)
    label_divisor: Divisor (el tamaño del fragmento)
    label_equation: Ecuación de división
    label_repadd: Suma repetida
    repadd_exact: — se divide exactamente!
    repadd_leftover: sobra
    repadd_less: '{N} es menor que {D}, por lo que el cociente es 0 y el valor completo
      es el resto.'
  eu:
    _name: Zatikizuna eta zatitzailea
    eq_lbl_dividend: zatikizuna
    eq_lbl_divisor: zatitzailea
    eq_lbl_quotient: zatidura
    eq_lbl_remainder: hondarra
    insight_exact: <strong>{N} ÷ {D} = {Q}</strong> zenbaki osoa — hondarrik gabe.
      Barra <strong>{Q}</strong> zati berdinetan betetzen da. Horrek esan nahi du
      <strong>{D}</strong> <strong>{N}</strong>-ren zatitzailea dela.
    insight_less: <strong>{N}</strong> zatitzailea baino txikiagoa da (<strong>{D}</strong>),
      beraz ez da zati oso bat sartzen. Balio osoa hondarra da. Hondarra beti zatitzailea
      baino txikiagoa da.
    insight_normal: '<strong>{N} ÷ {D} = {Q}</strong> hondarra <strong>{R}</strong>.
      Kontuan hartu pieza gorria (<strong>{R}</strong>) beti zati urdin bat (<strong>{D}</strong>)
      baino motzagoa dela. Hondarra beti zatitzailea baino txikiagoa da. Egiaztatu:
      <strong>{Q} × {D} + {R} = {QD} + {R} = {N}</strong> ✓'
    label_bar: Barra ikuspegia — zati urdin bakoitza =
    label_bar_units: unitate
    label_choose: Aukeratu zatikizuna eta zatitzailea
    label_dividend: Zatikizuna (zatitu beharreko zenbakia)
    label_divisor: Zatitzailea (zatiaren tamaina)
    label_equation: Zatiketa ekuazioa
    label_repadd: Batuketa errepikatua
    repadd_exact: — zehaztasunez zatitzen da!
    repadd_leftover: hondarra
    repadd_less: '{N} {D} baino txikiagoa da, beraz zatidura 0 da eta balio osoa hondarra
      da.'
  fr:
    _name: Dividende et diviseur
    eq_lbl_dividend: dividende
    eq_lbl_divisor: diviseur
    eq_lbl_quotient: quotient
    eq_lbl_remainder: reste
    insight_exact: <strong>{N} ÷ {D} = {Q}</strong> exactement — pas de reste. La
      barre se remplit parfaitement en <strong>{Q}</strong> morceaux égaux. Cela signifie
      que <strong>{D}</strong> est un diviseur de <strong>{N}</strong>.
    insight_less: <strong>{N}</strong> est plus petit que le diviseur <strong>{D}</strong>,
      donc il contient <strong>0</strong> morceau entier. Toute la valeur est le reste.
      Le reste est toujours inférieur au diviseur.
    insight_normal: '<strong>{N} ÷ {D} = {Q}</strong> reste <strong>{R}</strong>.
      Notez que la pièce rouge (<strong>{R}</strong>) est toujours plus courte qu''un
      morceau bleu (<strong>{D}</strong>). Le reste est toujours strictement inférieur
      au diviseur. Vérification : <strong>{Q} × {D} + {R} = {QD} + {R} = {N}</strong>
      ✓'
    label_bar: Vue en barre — chaque morceau bleu =
    label_bar_units: unités
    label_choose: Choisissez le dividende et le diviseur
    label_dividend: Dividende (le nombre à diviser)
    label_divisor: Diviseur (la taille du morceau)
    label_equation: Équation de division
    label_repadd: Addition répétée
    repadd_exact: — divise exactement !
    repadd_leftover: reste
    repadd_less: '{N} est inférieur à {D}, donc le quotient est 0 et toute la valeur
      est le reste.'
  nl:
    _name: Deeltal en deler
    eq_lbl_dividend: deeltal
    eq_lbl_divisor: deler
    eq_lbl_quotient: quotiënt
    eq_lbl_remainder: rest
    insight_exact: <strong>{N} ÷ {D} = {Q}</strong> precies — geen rest. De balk past
      perfect in <strong>{Q}</strong> gelijke stukken. Dit betekent dat <strong>{D}</strong>
      een deler is van <strong>{N}</strong>.
    insight_less: <strong>{N}</strong> is kleiner dan de deler <strong>{D}</strong>,
      dus het past in <strong>0</strong> hele stukken. De hele waarde is de rest.
      De rest is altijd kleiner dan de deler.
    insight_normal: '<strong>{N} ÷ {D} = {Q}</strong> rest <strong>{R}</strong>. Merk
      op dat het rode stuk (<strong>{R}</strong>) altijd korter is dan een blauw stuk
      (<strong>{D}</strong>). De rest is altijd strikt kleiner dan de deler. Controle:
      <strong>{Q} × {D} + {R} = {QD} + {R} = {N}</strong> ✓'
    label_bar: Balkweergave — elk blauw stuk =
    label_bar_units: eenheden
    label_choose: Kies deeltal en deler
    label_dividend: Deeltal (het getal dat gedeeld wordt)
    label_divisor: Deler (de grootte van het stuk)
    label_equation: Deelvergelijking
    label_repadd: Herhaalde optelling
    repadd_exact: — is precies deelbaar!
    repadd_leftover: blijft over
    repadd_less: '{N} is kleiner dan {D}, dus het quotiënt is 0 en de gehele waarde
      is de rest.'
factors:
  en:
    _name: Prime Factors
    gcd_formula_eq: ' = '
    gcd_none: (none — coprime)
    gcd_title: GCD — keep only shared factors
    insight_coprime: '<strong>{A}</strong> and <strong>{B}</strong> are coprime —
      they share no prime factors, so GCD = 1. The LCM is simply their product. Always
      true: <strong>{A} × {B} = {AB}</strong> = GCD × LCM = <strong>1 × {L} = {L}</strong>.'
    insight_shared_many: '<strong>{A}</strong> and <strong>{B}</strong> share the
      primes <strong>{primes}</strong>. The GCD takes only the green shared blocks.
      The LCM takes all blocks — green shared, blue extras from A, red extras from
      B — with no prime counted twice. Always true: <strong>{A} × {B} = {AB}</strong>
      = GCD × LCM = <strong>{G} × {L} = {GL}</strong>.'
    insight_shared_one: '<strong>{A}</strong> and <strong>{B}</strong> share the prime
      <strong>{primes}</strong>. The GCD takes only the green shared blocks. The LCM
      takes all blocks — green shared, blue extras from A, red extras from B — with
      no prime counted twice. Always true: <strong>{A} × {B} = {AB}</strong> = GCD
      × LCM = <strong>{G} × {L} = {GL}</strong>.'
    label_choose: Choose two numbers
    label_factors: Prime factors
    label_how: How GCD and LCM are built
    lcm_formula_eq: ' = '
    lcm_title: LCM — union of all factors
    legend_onlyA: unique to A
    legend_onlyB: unique to B
    legend_shared: shared (used for GCD)
  es:
    _name: Factores primos
    gcd_formula_eq: ' = '
    gcd_none: (ninguno — coprimos)
    gcd_title: MCD — conservar solo los factores compartidos
    insight_coprime: '<strong>{A}</strong> y <strong>{B}</strong> son coprimos — no
      comparten factores primos, por lo que el MCD = 1. El MCM es simplemente su producto.
      Siempre es cierto: <strong>{A} × {B} = {AB}</strong> = MCD × MCM = <strong>1
      × {L} = {L}</strong>.'
    insight_shared_many: '<strong>{A}</strong> y <strong>{B}</strong> comparten los
      primos <strong>{primes}</strong>. El MCD toma solo los bloques verdes compartidos.
      El MCM toma todos los bloques — verdes compartidos, azules adicionales de A,
      rojos adicionales de B — sin contar ningún primo dos veces. Siempre es cierto:
      <strong>{A} × {B} = {AB}</strong> = MCD × MCM = <strong>{G} × {L} = {GL}</strong>.'
    insight_shared_one: '<strong>{A}</strong> y <strong>{B}</strong> comparten el
      primo <strong>{primes}</strong>. El MCD toma solo los bloques verdes compartidos.
      El MCM toma todos los bloques — verdes compartidos, azules adicionales de A,
      rojos adicionales de B — sin contar ningún primo dos veces. Siempre es cierto:
      <strong>{A} × {B} = {AB}</strong> = MCD × MCM = <strong>{G} × {L} = {GL}</strong>.'
    label_choose: Elige dos números
    label_factors: Factores primos
    label_how: Cómo se construyen el MCD y el MCM
    lcm_formula_eq: ' = '
    lcm_title: MCM — unión de todos los factores
    legend_onlyA: solo de A
    legend_onlyB: solo de B
    legend_shared: compartidos (usados para MCD)
  eu:
    _name: Faktore lehenak
    gcd_formula_eq: ' = '
    gcd_none: (bat ere ez — elkarrekiko lehenak)
    gcd_title: ZKH — partekatutako faktoreak bakarrik gordetzen dira
    insight_coprime: '<strong>{A}</strong> eta <strong>{B}</strong> elkarrekiko lehenak
      dira — ez dute zenbaki lehenik partekatzen, beraz ZKH = 1. MKT haien biderkadura
      da, zuzenean. Beti egia: <strong>{A} × {B} = {AB}</strong> = <strong>ZKH × MKT</strong>
      = <strong>1 × {L} = {L}</strong>.'
    insight_shared_many: '<strong>{A}</strong> eta <strong>{B}</strong>-k <strong>{primes}</strong>
      zenbaki lehenak partekatzen dituzte. ZKHk bloke berde partekatuak bakarrik hartzen
      ditu. MKTk bloke guztiak hartzen ditu — berde partekatuak, A-ren soberakinak
      urdin, B-renak gorri — zenbaki lehenik birritan zenbatu gabe. Beti egia: <strong>{A}
      × {B} = {AB}</strong> = <strong>ZKH × MKT</strong> = <strong>{G} × {L} = {GL}</strong>.'
    insight_shared_one: '<strong>{A}</strong> eta <strong>{B}</strong>-k <strong>{primes}</strong>
      zenbaki lehena partekatzen dute. ZKHk bloke berde partekatuak bakarrik hartzen
      ditu. MKTk bloke guztiak hartzen ditu — berde partekatuak, A-ren soberakin urdinak,
      B-renak gorri — zenbaki lehenik birritan zenbatu gabe. Beti egia: <strong>{A}
      × {B} = {AB}</strong> = <strong>ZKH × MKT</strong> = <strong>{G} × {L} = {GL}</strong>.'
    label_choose: Aukeratu bi zenbaki
    label_factors: Zenbaki lehenen faktorizazioa
    label_how: Nola eraikitzen dira ZKH eta MKT
    lcm_formula_eq: ' = '
    lcm_title: MKT — faktore guztien biderketa
    legend_onlyA: Ari bakarrik dagokiona
    legend_onlyB: Bri bakarrik dagokiona
    legend_shared: partekatua (ZKHrako erabilia)
  fr:
    _name: Facteurs premiers
    gcd_formula_eq: ' = '
    gcd_none: (aucun — premiers entre eux)
    gcd_title: PGCD — ne garder que les facteurs partagés
    insight_coprime: '<strong>{A}</strong> et <strong>{B}</strong> sont premiers entre
      eux — ils ne partagent aucun facteur premier, donc PGCD = 1. Le PPCM est simplement
      leur produit. Toujours vrai : <strong>{A} × {B} = {AB}</strong> = PGCD × PPCM
      = <strong>1 × {L} = {L}</strong>.'
    insight_shared_many: '<strong>{A}</strong> et <strong>{B}</strong> partagent les
      nombres premiers <strong>{primes}</strong>. Le PGCD ne prend que les blocs verts
      partagés. Le PPCM prend tous les blocs — verts partagés, bleus de A, rouges
      de B — sans compter aucun nombre premier deux fois. Toujours vrai : <strong>{A}
      × {B} = {AB}</strong> = PGCD × PPCM = <strong>{G} × {L} = {GL}</strong>.'
    insight_shared_one: '<strong>{A}</strong> et <strong>{B}</strong> partagent le
      nombre premier <strong>{primes}</strong>. Le PGCD ne prend que les blocs verts
      partagés. Le PPCM prend tous les blocs — verts partagés, bleus de A, rouges
      de B — sans compter aucun nombre premier deux fois. Toujours vrai : <strong>{A}
      × {B} = {AB}</strong> = PGCD × PPCM = <strong>{G} × {L} = {GL}</strong>.'
    label_choose: Choisissez deux nombres
    label_factors: Facteurs premiers
    label_how: Comment le PGCD et le PPCM sont construits
    lcm_formula_eq: ' = '
    lcm_title: PPCM — union de tous les facteurs
    legend_onlyA: unique à A
    legend_onlyB: unique à B
    legend_shared: partagé (utilisé pour le PGCD)
  nl:
    _name: Priemfactoren
    gcd_formula_eq: ' = '
    gcd_none: (geen — onderling ondeelbaar)
    gcd_title: GGD — behoud alleen gedeelde factoren
    insight_coprime: '<strong>{A}</strong> en <strong>{B}</strong> zijn onderling
      ondeelbaar — ze delen geen priemfactoren, dus GGD = 1. Het KGV is simpelweg
      hun product. Altijd waar: <strong>{A} × {B} = {AB}</strong> = GGD × KGV = <strong>1
      × {L} = {L}</strong>.'
    insight_shared_many: '<strong>{A}</strong> en <strong>{B}</strong> delen de priemfactoren
      <strong>{primes}</strong>. De GGD neemt alleen de groene gedeelde blokken. Het
      KGV neemt alle blokken — groen gedeeld, blauw extra van A, rood extra van B
      — zonder een priemfactor twee keer te tellen. Altijd waar: <strong>{A} × {B}
      = {AB}</strong> = GGD × KGV = <strong>{G} × {L} = {GL}</strong>.'
    insight_shared_one: '<strong>{A}</strong> en <strong>{B}</strong> delen de priemfactor
      <strong>{primes}</strong>. De GGD neemt alleen de groene gedeelde blokken. Het
